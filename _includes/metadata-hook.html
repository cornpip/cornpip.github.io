<!--
  Custom <head> injection point provided by Chirpy (`metadata-hook.html`).
  Theme-update safe: this overrides the gem's empty hook, NOT head.html itself.

  hreflang for bilingual (KO/EN) post pairs.
  Emitted ONLY when the post declares a translation pair via front matter:

    lang: ko-KR              # this post's language
    alt_lang: en             # the paired post's language
    alt_url: /posts/xxx-en/  # the paired post's path

  Posts without `alt_url` (the vast majority) output nothing here.
  Remember: hreflang must be reciprocal — BOTH posts must point to each other.
-->
<style>
  #breadcrumb { visibility: hidden; }
  #search-input { font-size: 0.95rem; }   /* override Bootstrap .form-control's 1rem; placeholder inherits this */

  /*
    Mobile: prevent document-level horizontal overflow. Chirpy handles neither
    of the two cases below; content wider than the viewport breaks orientation
    changes (leftover h-scroll / page not filling the width).
  */

  /* 1. Long display equations scroll inside their own box */
  mjx-container[jax="CHTML"][display="true"] {
    display: block;
    overflow-x: auto;
    overflow-y: hidden;
    max-width: 100%;
  }

  /* 2. Code-header file-path labels (span::after = attr(data-label-text))
        truncate instead of pushing past the viewport; flex item needs min-width: 0 */
  .code-header span {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /*
    Footnote back-links (the ↩ at the bottom of a post) jump to the reference
    in the body, which lands flush against the top of the viewport with no
    preceding context. Reserve 40% of the viewport above it so the reference
    settles near the middle of the screen instead.
    Theme JS does not touch footnote anchors, so this is a plain native
    anchor jump and scroll-margin applies.
  */
  sup[id^="fnref:"] {
    scroll-margin-top: 40vh;
  }
</style>

{% if page.alt_url and page.alt_lang %}
  <link rel="alternate" hreflang="{{ page.lang | default: site.lang }}" href="{{ page.url | absolute_url }}">
  <link rel="alternate" hreflang="{{ page.alt_lang }}" href="{{ page.alt_url | absolute_url }}">
{% endif %}

<!--
  Language switcher (jekyll-polyglot). Injected into the topbar via JS so NO gem
  file (topbar.html) is shadowed. Polyglot mirrors the whole site per language,
  so swapping the `/<lang>/` URL prefix always lands on a real page.
  Only renders when Polyglot exposes >= 2 languages.
-->
{% if site.languages and site.languages.size > 1 %}
  <style>
    #lang-switcher-wrap {
      display: inline-flex;
      align-items: center;
      margin-left: auto;   /* absorb free space → pin the pair next to search, stable per page */
      margin-right: 0.5rem;
    }
    #lang-switcher-wrap .lang-icon {
      margin-right: 0.35rem;
      font-size: 0.9rem;
      color: var(--sidebar-muted, inherit);   /* monochrome, inherits → adapts to light/dark */
    }
    #lang-switcher {
      height: 1.9rem;
      padding: 0 1.4rem 0 0.5rem;
      font-family: inherit;   /* match the blog body font (form controls don't inherit) */
      font-size: 0.85rem;
      color: var(--sidebar-muted, inherit);
      background-color: transparent;
      border: 1px solid var(--search-border-color, rgba(127, 127, 127, 0.3));
      border-radius: 1rem;
      cursor: pointer;
    }
    #lang-switcher:focus { outline: none; }
  </style>
  <script>
    window.__i18n = {
      langs: {{ site.languages | jsonify }},
      default: {{ site.default_lang | jsonify }},
      active: {{ site.active_lang | jsonify }},
      labels: { "ko-KR": "KO", "en": "EN" }
    };
    (function () {
      function init() {
        var cfg = window.__i18n;
        if (!cfg || !cfg.langs || cfg.langs.length < 2) return;
        if (document.getElementById("lang-switcher")) return;

        var path = location.pathname;
        var cur = cfg.default;
        for (var i = 0; i < cfg.langs.length; i++) {
          var l = cfg.langs[i];
          if (l !== cfg.default && (path === "/" + l || path.indexOf("/" + l + "/") === 0)) {
            cur = l;
            break;
          }
        }
        var base = path;
        if (cur !== cfg.default) {
          base = path.replace(new RegExp("^/" + cur), "");
          if (base === "") base = "/";
        }

        var sel = document.createElement("select");
        sel.id = "lang-switcher";
        sel.setAttribute("aria-label", "Language");
        cfg.langs.forEach(function (l) {
          var o = document.createElement("option");
          o.value = l;
          o.textContent = (cfg.labels && cfg.labels[l]) || l;
          if (l === cur) o.selected = true;
          sel.appendChild(o);
        });
        sel.addEventListener("change", function () {
          var t = sel.value;
          var dest = (t === cfg.default ? "" : "/" + t) + base;
          if (dest === "") dest = "/";
          location.pathname = dest;
        });

        /* Font Awesome globe (monochrome → theme-adaptive), the de-facto
           language-switcher glyph; paired with the select in one wrapper. */
        var wrap = document.createElement("span");
        wrap.id = "lang-switcher-wrap";
        var icon = document.createElement("i");
        icon.className = "fas fa-globe lang-icon";
        icon.setAttribute("aria-hidden", "true");
        wrap.appendChild(icon);
        wrap.appendChild(sel);

        /* Place the pair right before the search box so `margin-left:auto`
           pins it to the search cluster on the right, stable across pages. */
        var anchor =
          document.getElementById("search") ||
          document.getElementById("search-trigger");
        if (anchor && anchor.parentNode) {
          anchor.parentNode.insertBefore(wrap, anchor);
        } else {
          var tb = document.getElementById("topbar");
          if (tb) tb.appendChild(wrap);
        }
      }
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
    })();
  </script>
{% endif %}
